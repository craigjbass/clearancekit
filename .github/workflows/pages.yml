name: Deploy GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Copy screenshots into site
        run: cp Screenshots/recording.gif Screenshots/app-protections.png docs/

      - name: Convert app icon for site
        run: |
          pip install --require-hashes --no-deps -r .github/workflows/pages-requirements.txt
          python3 -c "from PIL import Image; img = Image.open('clearancekit/clearancekit.icon/Assets/ChatGPT Image Jan 26, 2026 at 11_46_59 PM.png'); img.resize((512, 512), Image.LANCZOS).save('docs/logo.png', 'PNG', optimize=True)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
