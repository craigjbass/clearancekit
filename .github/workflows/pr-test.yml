name: PR Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: |
          xcodebuild test \
            -scheme clearancekitTests \
            -destination 'platform=macOS'
