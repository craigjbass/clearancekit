name: PR Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Test
        run: |
          xcodebuild test \
            -scheme clearancekitTests \
            -destination 'platform=macOS'
