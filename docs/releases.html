<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F0WEQYXKXN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F0WEQYXKXN');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClearanceKit — Releases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f5f3ff;
      --surface-2: #ede9fe;
      --border: rgba(109,40,217,0.12);
      --text: #1e1030;
      --text-muted: #5a4b78;
      --text-faint: #9e8fb5;
      --accent: #7c3aed;
      --accent-bright: #8b5cf6;
      --accent-glow: rgba(124,58,237,0.25);
      --danger: #dc2626;
      --warning: #d97706;
      --green: #16a34a;
      --radius: 14px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo img { flex-shrink: 0; border-radius: 6px; }

    /* ── MAIN ── */
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 100px 24px 80px;
    }

    .page-heading {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* ── SECTION HEADING ── */
    .section-heading {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      margin: 32px 0 12px;
    }

    .section-heading:first-of-type { margin-top: 0; }

    /* ── RELEASE ACCORDION ── */
    .release {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .release-header {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .release-header:hover { background: var(--surface-2); }

    .release-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      flex-shrink: 0;
    }

    .release-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .release-date {
      font-size: 12px;
      color: var(--text-faint);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 9px;
      border-radius: 100px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .badge-latest {
      background: rgba(22,163,74,0.12);
      color: #15803d;
    }

    .badge-beta {
      background: rgba(124,58,237,0.1);
      color: var(--accent);
    }

    .release-download {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(124,58,237,0.2);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .release-download:hover { background: rgba(124,58,237,0.06); }

    .release-chevron {
      flex-shrink: 0;
      transition: transform 0.2s;
      color: var(--text-faint);
    }

    .release.open .release-chevron { transform: rotate(180deg); }

    .release-body {
      display: none;
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .release.open .release-body { display: block; }

    /* ── MARKDOWN RENDERING ── */
    .release-body h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin: 20px 0 8px;
      letter-spacing: -0.01em;
    }

    .release-body h2:first-child { margin-top: 0; }

    .release-body h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin: 14px 0 5px;
    }

    .release-body p { margin-bottom: 10px; }
    .release-body p:last-child { margin-bottom: 0; }

    .release-body ul, .release-body ol {
      padding-left: 20px;
      margin-bottom: 10px;
    }

    .release-body li { margin-bottom: 4px; }

    .release-body code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: rgba(124,58,237,0.07);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .release-body pre {
      background: #f8f7fe;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .release-body pre code { background: none; padding: 0; color: var(--text); }

    .release-body a { color: var(--accent); text-decoration: none; }
    .release-body a:hover { text-decoration: underline; }

    .release-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .release-body strong { color: var(--text); font-weight: 600; }

    .release-body blockquote {
      border-left: 3px solid rgba(217,119,6,0.4);
      background: #fffbeb;
      padding: 10px 14px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 10px;
      color: var(--text);
    }

    .release-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .release-body th, .release-body td {
      padding: 7px 12px;
      text-align: left;
      border: 1px solid var(--border);
    }

    .release-body th { background: var(--surface); font-weight: 600; color: var(--text); }

    /* ── LOADING / ERROR ── */
    .status-card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 28px 32px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    .status-card.loading { background: var(--surface); }
    .status-card.error   { background: #fef2f2; border-color: rgba(239,68,68,0.25); }

    .status-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-card.loading .status-icon { background: rgba(124,58,237,0.12); }
    .status-card.error   .status-icon { background: rgba(239,68,68,0.12); }

    .status-body { flex: 1; min-width: 0; }

    .status-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .status-card.loading .status-title { color: var(--accent); }
    .status-card.error   .status-title { color: var(--danger); }

    .status-detail {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(124,58,237,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-faint);
      font-size: 13px;
    }

    footer a { color: var(--text-faint); text-decoration: none; }
    footer a:hover { color: var(--text-muted); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" width="28" height="28" alt="" />
    ClearanceKit
  </a>
</nav>

<main>
  <h1 class="page-heading">Releases</h1>
  <p class="page-sub">All releases, newest first by publish date.</p>
  <div id="app"></div>
</main>

<footer>
  <a href="https://github.com/craigjbass/clearancekit">GitHub</a>
</footer>

<script>
(function () {
  const OWNER = 'craigjbass';
  const REPO  = 'clearancekit';
  const RELEASES_API = `https://api.github.com/repos/${OWNER}/${REPO}/releases?per_page=100`;
  const GH_HEADERS   = { Accept: 'application/vnd.github+json' };

  const app = document.getElementById('app');

  renderLoading();

  fetch(RELEASES_API, { headers: GH_HEADERS })
    .then(r => { if (!r.ok) throw new Error(`Releases API: ${r.status}`); return r.json(); })
    .then(releases => {
      // Sort by published_at timestamp descending so the newest release
      // is always first, regardless of how GitHub's API orders them or
      // how tag names compare by semver.
      releases.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
      render(releases);
    })
    .catch(err => renderError(err.message));

  // ── Helpers ─────────────────────────────────────────────────────────────

  function isBeta(release) {
    return release.prerelease || /beta|alpha|rc/i.test(release.tag_name);
  }

  function dmgUrl(release) {
    const asset = (release.assets || []).find(a => a.name.endsWith('.dmg'));
    return asset ? asset.browser_download_url : null;
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // ── Render ───────────────────────────────────────────────────────────────

  function render(releases) {
    if (!releases.length) { renderError('No releases found.'); return; }

    const stableReleases = releases.filter(r => !isBeta(r));
    const betaReleases   = releases.filter(r => isBeta(r));

    let html = '';

    if (stableReleases.length) {
      html += '<div class="section-heading">Stable releases</div>';
      html += stableReleases.map((r, i) => releaseCard(r, i === 0 ? 'latest' : null)).join('');
    }

    if (betaReleases.length) {
      html += '<div class="section-heading">Beta releases</div>';
      html += betaReleases.map((r, i) => releaseCard(r, i === 0 ? 'beta' : null)).join('');
    }

    app.innerHTML = html;
    wireAccordions();
  }

  function renderLoading() {
    app.innerHTML = `
      <div class="status-card loading">
        <div class="status-icon"><div class="spinner"></div></div>
        <div class="status-body">
          <div class="status-title">Loading releases…</div>
          <div class="status-detail">Fetching from GitHub</div>
        </div>
      </div>`;
  }

  function renderError(msg) {
    app.innerHTML = `
      <div class="status-card error">
        <div class="status-icon">${iconError()}</div>
        <div class="status-body">
          <div class="status-title">Could not load releases</div>
          <div class="status-detail">${escapeHtml(msg)}</div>
        </div>
      </div>`;
  }

  // ── Cards ────────────────────────────────────────────────────────────────

  function releaseCard(release, badge) {
    const body   = release.body ? markdownToHtml(release.body) : '<p><em>No release notes.</em></p>';
    const name   = release.name || release.tag_name;
    const dlUrl  = dmgUrl(release);
    const date   = release.published_at ? formatDate(release.published_at) : '';
    const dlLink = dlUrl
      ? `<a class="release-download" href="${escapeHtml(dlUrl)}" title="Download DMG" onclick="event.stopPropagation()">${iconDownload()} DMG</a>`
      : '';
    const badgeHtml = badge === 'latest'
      ? '<span class="badge badge-latest">Latest</span>'
      : badge === 'beta'
        ? '<span class="badge badge-beta">Latest beta</span>'
        : '';

    return `
      <div class="release">
        <div class="release-header">
          <span class="release-tag">${escapeHtml(release.tag_name)}</span>
          <span class="release-name">${escapeHtml(name)}</span>
          ${badgeHtml}
          ${date ? `<span class="release-date">${escapeHtml(date)}</span>` : ''}
          ${dlLink}
          <svg class="release-chevron" width="15" height="15" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="release-body">${body}</div>
      </div>`;
  }

  function wireAccordions() {
    document.querySelectorAll('.release-header').forEach(header => {
      header.addEventListener('click', () => header.closest('.release').classList.toggle('open'));
    });
    const first = document.querySelector('.release');
    if (first) first.classList.add('open');
  }

  // ── Minimal Markdown → HTML ──────────────────────────────────────────────

  function markdownToHtml(md) {
    const lines = md.split('\n');
    const out   = [];
    let inList  = false;
    let inTable = false;
    let tableHeaderDone = false;

    function flushList()  { if (inList)  { out.push('</ul>'); inList = false; } }
    function flushTable() {
      if (inTable) { out.push('</tbody></table>'); inTable = false; tableHeaderDone = false; }
    }

    for (const raw of lines) {
      const line = raw.trimEnd();

      if (line === '') { flushList(); flushTable(); out.push(''); continue; }
      if (/^---+$/.test(line)) { flushList(); flushTable(); out.push('<hr>'); continue; }

      const h2 = line.match(/^## (.+)/);
      if (h2) { flushList(); flushTable(); out.push(`<h2>${inline(h2[1])}</h2>`); continue; }

      const h3 = line.match(/^### (.+)/);
      if (h3) { flushList(); flushTable(); out.push(`<h3>${inline(h3[1])}</h3>`); continue; }

      const h4 = line.match(/^#### (.+)/);
      if (h4) { flushList(); flushTable(); out.push(`<h4>${inline(h4[1])}</h4>`); continue; }

      const bq = line.match(/^> (.+)/);
      if (bq) { flushList(); flushTable(); out.push(`<blockquote>${inline(bq[1])}</blockquote>`); continue; }

      if (line.includes('|')) {
        const cells = line.split('|').slice(1, -1).map(c => c.trim());
        if (inTable && /^\|[-| :]+\|$/.test(line.replace(/\s/g, ''))) {
          out.push('</thead><tbody>'); tableHeaderDone = true; continue;
        }
        if (!inTable) { flushList(); out.push('<table><thead>'); inTable = true; tableHeaderDone = false; }
        const tag = tableHeaderDone ? 'td' : 'th';
        out.push(`<tr>${cells.map(c => `<${tag}>${inline(c)}</${tag}>`).join('')}</tr>`);
        continue;
      }

      const li = line.match(/^[-*] (.+)/);
      if (li) { flushTable(); if (!inList) { out.push('<ul>'); inList = true; } out.push(`<li>${inline(li[1])}</li>`); continue; }

      flushList(); flushTable();
      out.push(`<p>${inline(line)}</p>`);
    }

    flushList(); flushTable();
    return out.join('\n');
  }

  function inline(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
        const safeUrl = /^https?:\/\//i.test(url) ? escapeHtml(url) : '';
        return safeUrl ? `<a href="${safeUrl}" target="_blank" rel="noopener">${label}</a>` : label;
      });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function iconDownload() {
    return `<svg width="13" height="13" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  function iconError() {
    return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="10" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1.5"/>
      <path d="M7.5 7.5l7 7M14.5 7.5l-7 7" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  }
})();
</script>
</body>
</html>
