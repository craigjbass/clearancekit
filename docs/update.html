  <style>
    /* ============================================================
       CLEARANCEKIT DESIGN SYSTEM — canonical CSS
       Pasted verbatim into index.html, documentation.html, update.html
       ============================================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0a0a;
      --fg:     #e7e7e7;
      --dim:    #888888;
      --faint:  #555555;
      --green:  #9fef00;
      --red:    #ef4444;
      --border: #222222;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    /* nav */
    .nav {
      font-size: 12px;
      color: var(--dim);
      padding: 4px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .nav a {
      color: var(--fg);
      text-decoration: none;
    }
    .nav a:hover { color: var(--green); }
    .sep { color: var(--faint); margin: 0 8px; }
    .nav a[aria-current="page"] { color: var(--dim); }

    /* section header */
    .sh {
      color: var(--dim);
      font-size: 12px;
      margin: 40px 0 14px;
    }

    /* document headings (used by documentation.html) */
    h1, h2, h3, h4 {
      color: var(--fg);
      font-weight: normal;
      margin: 32px 0 14px;
    }
    h1 { font-size: 18px; }
    h2 { font-size: 15px; }
    h3 { font-size: 13px; }
    h4 { font-size: 13px; }
    h2::before { content: "## "; color: var(--dim); }
    h3::before { content: "### "; color: var(--dim); }

    /* prose */
    p { margin: 0 0 14px; max-width: 80ch; }
    p.lead { color: var(--fg); font-size: 15px; margin-bottom: 24px; }
    p.dim { color: var(--dim); }

    /* links */
    a { color: var(--fg); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--green); }

    /* bracketed link */
    .blink {
      color: var(--fg);
      text-decoration: none;
      margin-right: 14px;
      display: inline-block;
    }
    .blink::before { content: "[ "; color: var(--dim); }
    .blink::after  { content: " ]"; color: var(--dim); }
    .blink:hover { color: var(--green); }
    .blink:hover::before, .blink:hover::after { color: var(--green); }

    /* ascii box / diagram */
    pre.ascii {
      color: var(--green);
      line-height: 1.4;
      margin: 0 0 18px;
      white-space: pre;
      overflow-x: auto;
      border-left: none;
      padding: 0;
    }
    pre.ascii.fg { color: var(--fg); }

    /* stats line */
    .stats {
      color: var(--fg);
      margin: 0 0 24px;
      white-space: pre;
      font-family: inherit;
    }
    .k { color: var(--dim); }

    /* numbered steps */
    ol.steps {
      list-style: none;
      counter-reset: step;
      margin: 0 0 18px;
    }
    ol.steps li {
      counter-increment: step;
      padding-left: 32px;
      position: relative;
      margin-bottom: 8px;
    }
    ol.steps li::before {
      content: counter(step) ".";
      position: absolute;
      left: 0;
      color: var(--dim);
    }

    /* bullet list */
    ul.bullets {
      list-style: none;
      margin: 0 0 18px;
    }
    ul.bullets > li {
      padding-left: 16px;
      position: relative;
      margin-bottom: 14px;
    }
    ul.bullets > li::before {
      content: "-";
      position: absolute;
      left: 0;
      color: var(--dim);
    }
    ul.bullets > li > .desc {
      color: var(--dim);
      display: block;
      margin-top: 2px;
    }

    /* definition list (paths + descriptions) */
    dl.paths { margin: 0 0 18px; }
    dl.paths dt {
      color: var(--green);
      margin-top: 14px;
    }
    dl.paths dt:first-child { margin-top: 0; }
    dl.paths dd {
      color: var(--dim);
      margin: 2px 0 0;
      padding-left: 16px;
    }

    /* two column comparison */
    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin: 0 0 18px;
    }
    .compare h4 {
      margin: 0 0 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .compare ul {
      list-style: none;
    }
    .compare li {
      padding-left: 16px;
      position: relative;
      margin-bottom: 6px;
      color: var(--dim);
    }
    .compare li::before {
      content: "-";
      position: absolute;
      left: 0;
      color: var(--faint);
    }
    @media (max-width: 768px) {
      .compare { grid-template-columns: 1fr; gap: 18px; }
    }

    /* shell-prompt block */
    pre.shell {
      color: var(--fg);
      background: transparent;
      margin: 0 0 14px;
      white-space: pre;
      overflow-x: auto;
      border-left: none;
      padding: 0;
    }
    pre.shell .p { color: var(--green); }
    pre.shell .c { color: var(--dim); }

    /* inline code */
    code {
      color: var(--green);
      background: transparent;
    }

    /* code blocks (markdown-rendered fenced blocks) */
    pre {
      background: transparent;
      border-left: 1px solid var(--border);
      padding: 0 0 0 14px;
      margin: 0 0 14px;
      overflow-x: auto;
      color: var(--fg);
    }
    pre code { color: inherit; }

    /* tables (used by documentation.html for managed-policy schemas) */
    table {
      border-collapse: collapse;
      margin: 0 0 18px;
      font-size: 13px;
      width: 100%;
    }
    th, td {
      text-align: left;
      padding: 6px 14px 6px 0;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      color: var(--fg);
    }
    th { color: var(--dim); font-weight: normal; }

    /* footer */
    .foot {
      color: var(--dim);
      font-size: 12px;
      padding: 32px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }

    /* toc (documentation only) */
    .toc {
      margin: 0 0 32px;
      color: var(--dim);
      line-height: 1.8;
    }

    /* ============================================================
       update.html widget CSS — re-themes JS-emitted classes
       (status cards, releases, advisories, severity badges)
       ============================================================ */

    .version-picker { margin: 0 0 24px; }
    .version-picker h2 { margin: 0 0 8px; }
    .version-picker p { margin: 0 0 14px; color: var(--dim); }
    .version-picker-row { margin: 0; }
    .version-select {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      width: 100%;
      max-width: 480px;
    }
    .version-select:focus { outline: 1px solid var(--green); }

    .status-card {
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin: 0 0 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .status-card.up-to-date { border-color: var(--green); }
    .status-card.outdated   { border-color: var(--red); }
    .status-card.error      { border-color: var(--red); }
    .status-card.loading    { border-color: var(--dim); }
    .status-card.unknown    { border-color: var(--dim); }

    .status-icon { display: none; }

    .status-body { flex: 1; min-width: 0; }
    .status-title {
      font-weight: normal;
      margin: 0 0 4px;
    }
    .status-card.up-to-date .status-title { color: var(--green); }
    .status-card.outdated   .status-title { color: var(--red); }
    .status-card.error      .status-title { color: var(--red); }
    .status-card.loading    .status-title { color: var(--dim); }
    .status-card.unknown    .status-title { color: var(--dim); }
    .status-detail { color: var(--dim); margin: 0; }
    .status-detail code { color: var(--green); }

    .btn-download {
      display: inline-block;
      color: var(--fg);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 12px;
      margin-top: 8px;
    }
    .btn-download::before { content: "[ "; color: var(--dim); }
    .btn-download::after  { content: " ]"; color: var(--dim); }
    .btn-download:hover { color: var(--green); border-color: var(--green); }
    .btn-download:hover::before, .btn-download:hover::after { color: var(--green); }

    .spinner { display: inline-block; color: var(--dim); }
    .spinner::after { content: "..."; }

    .section-heading {
      color: var(--dim);
      font-size: 12px;
      margin: 32px 0 14px;
    }

    .release, .advisory {
      border-bottom: 1px solid var(--border);
      padding: 0;
      margin: 0;
    }
    .release-header, .advisory-header {
      cursor: pointer;
      padding: 10px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .release-header:hover, .advisory-header:hover { color: var(--green); }
    .release-chevron, .advisory-chevron {
      color: var(--dim);
      font-family: inherit;
    }
    .release-chevron::before, .advisory-chevron::before { content: "+"; }
    .release.open .release-chevron::before,
    .advisory.open .advisory-chevron::before { content: "-"; }

    .release-name { color: var(--fg); }
    .release-tag  { color: var(--dim); margin-left: auto; }

    .release-download {
      color: var(--fg);
      text-decoration: none;
      margin-left: 12px;
    }
    .release-download::before { content: "[ "; color: var(--dim); }
    .release-download::after  { content: " ]"; color: var(--dim); }
    .release-download:hover,
    .release-download:hover::before,
    .release-download:hover::after { color: var(--green); }

    .release-body, .advisory-body {
      display: none;
      padding: 0 0 18px 0;
      color: var(--dim);
    }
    .release.open .release-body,
    .advisory.open .advisory-body { display: block; }

    .advisory-summary { color: var(--fg); flex: 1; }
    .advisory-status { font-size: 12px; }
    .advisory-status.affected       { color: var(--red); }
    .advisory-status.patched        { color: var(--green); }
    .advisory-status.unknown-status { color: var(--dim); }

    .severity-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      color: var(--dim);
      margin-right: 8px;
    }
    .advisory.critical .severity-badge { color: var(--red);   border-color: var(--red); }
    .advisory.high     .severity-badge { color: var(--red);   border-color: var(--red); }
    .advisory.medium   .severity-badge { color: var(--fg);    border-color: var(--dim); }
    .advisory.low      .severity-badge { color: var(--green); border-color: var(--green); }

    .advisory-link { color: var(--green); }
    .advisory-meta {
      display: block;
      margin-top: 8px;
      font-size: 12px;
    }
    .advisory-meta-item { margin-right: 16px; }
    .advisory-meta-label { color: var(--dim); margin-right: 4px; }
    .advisory-meta-value { color: var(--fg); }
  </style>
</head>
<body>
  <div class="page">

    <div class="nav">
      <a href="index.html">clearancekit</a><span class="sep">·</span><a href="index.html">home</a><span class="sep">·</span><a href="documentation.html">docs</a><span class="sep">·</span><a href="https://github.com/craigjbass/clearancekit/releases/latest">download</a><span class="sep">·</span><a href="https://github.com/craigjbass/clearancekit">source</a>
    </div>

    <div class="sh">// update check</div>

    <div id="app"></div>

    <div class="foot">
      <span class="k">// license:</span> MIT
      <span class="sep">·</span>
      <span class="k">source:</span> <a href="https://github.com/craigjbass/clearancekit">github.com/craigjbass/clearancekit</a>
    </div>

  </div>

<script>
(function () {
  const OWNER = 'craigjbass';
  const REPO  = 'clearancekit';
  const RELEASES_API   = `https://api.github.com/repos/${OWNER}/${REPO}/releases?per_page=100`;
  const ADVISORIES_API = `https://api.github.com/repos/${OWNER}/${REPO}/security-advisories?per_page=100`;
  const GH_HEADERS     = { Accept: 'application/vnd.github+json' };

  const app = document.getElementById('app');

  const params = new URLSearchParams(window.location.search);
  let activeSha = (params.get('sha') || '').trim().toLowerCase();

  let cachedReleases   = null;
  let cachedAdvisories = null;

  renderLoading();

  Promise.all([
    fetch(RELEASES_API,   { headers: GH_HEADERS }).then(r => { if (!r.ok) throw new Error(`Releases API: ${r.status}`); return r.json(); }),
    fetch(ADVISORIES_API, { headers: GH_HEADERS }).then(r => r.ok ? r.json() : []),
  ])
  .then(([releases, advisories]) => {
    releases.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
    cachedReleases   = releases;
    cachedAdvisories = advisories;
    if (!activeSha) {
      renderPicker(releases.filter(r => !isBeta(r)));
    } else {
      render(releases, advisories);
    }
  })
  .catch(err => renderError(err.message));

  window.addEventListener('popstate', () => {
    activeSha = (new URLSearchParams(window.location.search).get('sha') || '').trim().toLowerCase();
    if (!activeSha) {
      renderPicker(cachedReleases.filter(r => !isBeta(r)));
    } else {
      render(cachedReleases, cachedAdvisories);
    }
  });

  // ── Helpers ─────────────────────────────────────────────────────────────

  function shaFromTag(tag) {
    const parts = tag.split('-');
    return parts[parts.length - 1].toLowerCase();
  }

  function dmgUrl(release) {
    const asset = (release.assets || []).find(a => a.name.endsWith('.dmg'));
    return asset ? asset.browser_download_url : null;
  }

  function isBeta(release) {
    return release.prerelease || /beta|alpha|rc/i.test(release.tag_name);
  }

  // Parse a semver-ish version string "X.Y.Z" → [X, Y, Z] or null
  function parseVersion(str) {
    const m = str.match(/(\d+)\.(\d+)\.?(\d*)/);
    if (!m) return null;
    return [parseInt(m[1], 10), parseInt(m[2], 10), parseInt(m[3] || '0', 10)];
  }

  // -1 / 0 / 1
  function compareVersions(a, b) {
    for (let i = 0; i < 3; i++) {
      if (a[i] !== b[i]) return a[i] < b[i] ? -1 : 1;
    }
    return 0;
  }

  // Given a patched_versions string like ">= 4.2.14", return the min patched version
  function minPatchedVersion(str) {
    if (!str) return null;
    const m = str.match(/>=?\s*([0-9.]+)/);
    return m ? parseVersion(m[1]) : null;
  }

  // Strip a leading "v" so tag names like "v5.0.10-beta-abc" align with the
  // advisory's version strings ("5.0.10-beta-abc").
  function normalizeTag(tag) {
    return (tag || '').replace(/^v/, '').trim();
  }

  // Returns true if `tag` is listed as an explicit `= X.Y.Z-beta-sha` clause in
  // `rangeStr`. Beta builds share the same numeric major.minor.patch as the
  // upcoming stable, so they cannot be distinguished by the semver-compare
  // path; the advisory ships them as exact-version entries.
  function rangeContainsExactTag(rangeStr, tag) {
    if (!rangeStr) return false;
    const cleanTag = normalizeTag(tag);
    if (!cleanTag) return false;
    return rangeStr.split(',').some(clause => {
      const eq = clause.trim().match(/^=\s*(.+)$/);
      return eq != null && eq[1].trim() === cleanTag;
    });
  }

  // 'affected' | 'patched' | 'unknown'
  function advisoryStatus(advisory, currentTag) {
    // Exact beta listings take precedence — the numeric compare below cannot
    // tell `5.0.10-beta-eab3c5d` apart from `5.0.10-beta-481a53f`.
    for (const vuln of (advisory.vulnerabilities || [])) {
      if (rangeContainsExactTag(vuln.vulnerable_version_range, currentTag)) {
        return 'affected';
      }
    }

    const current = parseVersion(currentTag);
    if (!current) return 'unknown';
    for (const vuln of (advisory.vulnerabilities || [])) {
      const minPatched = minPatchedVersion(vuln.patched_versions);
      if (!minPatched) continue;
      // If current >= minPatched → patched by at least this vuln entry
      if (compareVersions(current, minPatched) >= 0) return 'patched';
      return 'affected';
    }
    return 'unknown';
  }

  // ── Render ───────────────────────────────────────────────────────────────

  function renderPicker(stableReleases) {
    const options = stableReleases
      .map(r => `<option value="${escapeHtml(r.tag_name)}">${escapeHtml(r.tag_name)}</option>`)
      .join('');
    app.innerHTML = `
      <div class="version-picker">
        <h2>Which version are you running?</h2>
        <p>Select your installed version to check for updates.</p>
        <div class="version-picker-row">
          <select id="version-select" class="version-select">
            <option value="">Choose a version…</option>
            ${options}
          </select>
        </div>
      </div>`;
    document.getElementById('version-select').addEventListener('change', e => {
      const tag = e.target.value;
      if (!tag) return;
      activeSha = shaFromTag(tag);
      history.pushState(null, '', `?sha=${activeSha}`);
      render(cachedReleases, cachedAdvisories);
    });
  }

  function renderLoading() {
    app.innerHTML = `
      <div class="status-card loading">
        <div class="status-icon"><div class="spinner"></div></div>
        <div class="status-body">
          <div class="status-title">Checking for updates…</div>
          <div class="status-detail">Looking up <code>${escapeHtml(activeSha || '…')}</code></div>
        </div>
      </div>`;
  }

  function render(allReleases, advisories) {
    const candidates = allReleases.filter(r => shaFromTag(r.tag_name) === activeSha);
    const current = candidates.find(r => !isBeta(r)) || candidates[0];
    const releases = (current && isBeta(current)) ? allReleases : allReleases.filter(r => !isBeta(r));
    if (!releases.length) { renderError('No releases found.'); return; }

    const latest  = releases[0];

    const published = (advisories || []).filter(a => a.state === 'published');

    let statusHtml;
    let newerReleases = [];

    if (!current) {
      const latestDmg = dmgUrl(latest);
      statusHtml = `
        <div class="status-card unknown">
          <div class="status-icon">${iconUnknown()}</div>
          <div class="status-body">
            <div class="status-title">Build not recognised</div>
            <div class="status-detail">No release found matching SHA <code>${escapeHtml(activeSha)}</code>.
              The latest release is <code>${escapeHtml(latest.tag_name)}</code>.</div>
            ${latestDmg ? `<a class="btn-download" href="${escapeHtml(latestDmg)}">${iconDownload()} Download ${escapeHtml(latest.tag_name)}</a>` : ''}
          </div>
        </div>`;
      newerReleases = [latest];
    } else if (current.tag_name === latest.tag_name) {
      const latestDmg = dmgUrl(current);
      statusHtml = `
        <div class="status-card up-to-date">
          <div class="status-icon">${iconCheck()}</div>
          <div class="status-body">
            <div class="status-title">You're up to date</div>
            <div class="status-detail"><code>${escapeHtml(current.tag_name)}</code> is the latest release.</div>
            ${latestDmg ? `<a class="btn-download" href="${escapeHtml(latestDmg)}">${iconDownload()} Download ${escapeHtml(current.tag_name)}</a>` : ''}
          </div>
        </div>`;
    } else {
      const idx   = releases.indexOf(current);
      newerReleases = releases.slice(0, idx);
      const count = newerReleases.length;
      const word  = count === 1 ? 'release' : 'releases';
      const latestDmg = dmgUrl(latest);
      statusHtml = `
        <div class="status-card outdated">
          <div class="status-icon">${iconWarning()}</div>
          <div class="status-body">
            <div class="status-title">Update available</div>
            <div class="status-detail">You are running <code>${escapeHtml(current.tag_name)}</code>.
              There ${count === 1 ? 'is' : 'are'} <strong>${count} newer ${word}</strong> available.</div>
            ${latestDmg ? `<a class="btn-download" href="${escapeHtml(latestDmg)}">${iconDownload()} Download ${escapeHtml(latest.tag_name)}</a>` : ''}
          </div>
        </div>`;
    }

    const currentTagForAdvisories = current ? current.tag_name : querySha;

    const currentNotesHtml = (current && isBeta(current) && current.body) ? `
      <div class="section-heading">Release notes</div>
      ${releaseCard(current)}` : '';

    const advisoriesHtml = published.length ? `
      <div class="section-heading">Security advisories</div>
      ${published.map(a => advisoryCard(a, currentTagForAdvisories)).join('')}` : '';

    const releasesHtml = newerReleases.length ? `
      <div class="section-heading">${current && current.tag_name !== (releases[0] || {}).tag_name ? "What's new" : 'Latest release'}</div>
      ${newerReleases.map(r => releaseCard(r)).join('')}` : '';

    app.innerHTML = statusHtml + currentNotesHtml + advisoriesHtml + releasesHtml;
    wireAccordions();
  }

  function renderError(msg) {
    app.innerHTML = `
      <div class="status-card error">
        <div class="status-icon">${iconError()}</div>
        <div class="status-body">
          <div class="status-title">Could not check for updates</div>
          <div class="status-detail">${escapeHtml(msg)}</div>
        </div>
      </div>`;
  }

  // ── Cards ────────────────────────────────────────────────────────────────

  function advisoryCard(advisory, currentTag) {
    const severity   = (advisory.severity || 'unknown').toLowerCase();
    const safeClass  = ['critical','high','medium','low'].includes(severity) ? severity : 'medium';
    const status     = advisoryStatus(advisory, currentTag);
    const statusLabel = status === 'affected' ? 'Affects your version'
                      : status === 'patched'  ? 'Your version is patched'
                      :                         'Check advisory';

    const patchedStr = (advisory.vulnerabilities || [])
      .map(v => v.patched_versions).filter(Boolean)
      .filter((v, i, a) => a.indexOf(v) === i).join(', ');

    return `
      <div class="advisory ${safeClass}">
        <div class="advisory-header">
          <span class="severity-badge">${escapeHtml(severity)}</span>
          <span class="advisory-summary">${escapeHtml(advisory.summary || advisory.ghsa_id)}</span>
          <span class="advisory-status ${status === 'affected' ? 'affected' : status === 'patched' ? 'patched' : 'unknown-status'}">${statusLabel}</span>
          <svg class="advisory-chevron" width="15" height="15" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="advisory-body">
          <div class="advisory-meta">
            <div class="advisory-meta-item">
              <span class="advisory-meta-label">ID</span>
              <span class="advisory-meta-value">${escapeHtml(advisory.ghsa_id)}</span>
            </div>
            ${patchedStr ? `<div class="advisory-meta-item">
              <span class="advisory-meta-label">Patched in</span>
              <span class="advisory-meta-value">${escapeHtml(patchedStr)}</span>
            </div>` : ''}
          </div>
          <a class="advisory-link" href="${escapeHtml(advisory.html_url)}" target="_blank" rel="noopener">
            View full advisory
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 10L10 2M10 2H5M10 2v5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>`;
  }

  function releaseCard(release) {
    const body = release.body ? markdownToHtml(release.body) : '<p><em>No release notes.</em></p>';
    const name = release.name || release.tag_name;
    const dlUrl = dmgUrl(release);
    const dlLink = dlUrl
      ? `<a class="release-download" href="${escapeHtml(dlUrl)}" title="Download DMG" onclick="event.stopPropagation()">${iconDownload()} DMG</a>`
      : '';
    return `
      <div class="release">
        <div class="release-header">
          <span class="release-tag">${escapeHtml(release.tag_name)}</span>
          <span class="release-name">${escapeHtml(name)}</span>
          ${dlLink}
          <svg class="release-chevron" width="15" height="15" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="release-body">${body}</div>
      </div>`;
  }

  function wireAccordions() {
    document.querySelectorAll('.release-header, .advisory-header').forEach(header => {
      header.addEventListener('click', () => header.closest('.release, .advisory').classList.toggle('open'));
    });
    // Auto-open first release if any
    const firstRelease = document.querySelector('.release');
    if (firstRelease) firstRelease.classList.add('open');
    // Auto-open affected advisories
    document.querySelectorAll('.advisory').forEach(el => {
      if (el.querySelector('.advisory-status.affected')) el.classList.add('open');
    });
  }

  // ── Minimal Markdown → HTML ──────────────────────────────────────────────

  function markdownToHtml(md) {
    const lines = md.split('\n');
    const out   = [];
    let inList  = false;
    let inTable = false;
    let tableHeaderDone = false;

    function flushList()  { if (inList)  { out.push('</ul>'); inList = false; } }
    function flushTable() {
      if (inTable) { out.push('</tbody></table>'); inTable = false; tableHeaderDone = false; }
    }

    for (const raw of lines) {
      const line = raw.trimEnd();

      if (line === '') { flushList(); flushTable(); out.push(''); continue; }
      if (/^---+$/.test(line)) { flushList(); flushTable(); out.push('<hr>'); continue; }

      const h2 = line.match(/^## (.+)/);
      if (h2) { flushList(); flushTable(); out.push(`<h2>${inline(h2[1])}</h2>`); continue; }

      const h3 = line.match(/^### (.+)/);
      if (h3) { flushList(); flushTable(); out.push(`<h3>${inline(h3[1])}</h3>`); continue; }

      const h4 = line.match(/^#### (.+)/);
      if (h4) { flushList(); flushTable(); out.push(`<h4>${inline(h4[1])}</h4>`); continue; }

      const bq = line.match(/^> (.+)/);
      if (bq) { flushList(); flushTable(); out.push(`<blockquote>${inline(bq[1])}</blockquote>`); continue; }

      if (line.includes('|')) {
        const cells = line.split('|').slice(1, -1).map(c => c.trim());
        if (/^\|[-| :]+\|$/.test(line.replace(/\s/g, ''))) {
          out.push('</thead><tbody>'); tableHeaderDone = true; continue;
        }
        if (!inTable) { flushList(); out.push('<table><thead>'); inTable = true; tableHeaderDone = false; }
        const tag = tableHeaderDone ? 'td' : 'th';
        out.push(`<tr>${cells.map(c => `<${tag}>${inline(c)}</${tag}>`).join('')}</tr>`);
        continue;
      }

      const li = line.match(/^[-*] (.+)/);
      if (li) { flushTable(); if (!inList) { out.push('<ul>'); inList = true; } out.push(`<li>${inline(li[1])}</li>`); continue; }

      flushList(); flushTable();
      out.push(`<p>${inline(line)}</p>`);
    }

    flushList(); flushTable();
    return out.join('\n');
  }

  function inline(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function iconCheck() {
    return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="10" fill="rgba(22,163,74,0.15)"/>
      <path d="M6.5 11.5l3 3 6-6" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function iconWarning() {
    return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M11 2L20.5 19H1.5L11 2Z" fill="rgba(217,119,6,0.15)" stroke="#d97706" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M11 8.5v4M11 14.5v.5" stroke="#d97706" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  }

  function iconError() {
    return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="10" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1.5"/>
      <path d="M7.5 7.5l7 7M14.5 7.5l-7 7" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  }

  function iconUnknown() {
    return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="10" fill="rgba(124,58,237,0.1)" stroke="#7c3aed" stroke-width="1.5"/>
      <path d="M8.5 8.5a2.5 2.5 0 0 1 5 0c0 1.5-2.5 2-2.5 4" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="11" cy="15.5" r="0.8" fill="#7c3aed"/></svg>`;
  }

  function iconDownload() {
    return `<svg width="13" height="13" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }
})();
</script>
