SPECIFICATION Spec

\* Minimal counterexample parameters.
\*
\* TLC finds that just 2 of the 3 events are enough to cause a crash.
\* Both arrive at t=0 on a pool with 1 thread. Each task holds the
\* thread for 2 ticks. The deadline is 4 ticks after arrival.
\*
\*   t=0  Event 1 queued, Event 2 queued
\*   t=0  Event 1 starts running  (pool full)
\*   t=2  Event 1 responds, Event 2 starts running
\*   t=4  Event 2's deadline expires — still running, never responded.
\*        ES kills the client.
\*
\* Total time for event 2: queue wait (2) + eval (2) = 4 = deadline.

CONSTANTS
    MaxEvents = 3
    PoolSize  = 1
    EvalTime  = 2
    Deadline  = 4

INVARIANT
    TypeOK
    ClientNeverTerminated

\* Bound clock to keep the state space finite for TLC.
CONSTRAINT
    ClockBound
