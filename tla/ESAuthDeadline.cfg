SPECIFICATION Spec

\* 3 events, 2 threads, deadline 4 ticks, slow=3 ticks, fast=1 tick.
\* With 3 slow events on 2 threads: events 1-2 finish at tick 3, event 3
\* starts at tick 3 and finishes at tick 6 > Deadline 4.  Expect violation.
CONSTANTS
    NumEvents = 3
    PoolSize  = 2
    Deadline  = 4
    SlowTicks = 3
    FastTicks = 1

INVARIANT NoDeadlineMiss
