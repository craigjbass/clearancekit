SPECIFICATION Spec

\* 5 events, eventBuffer capacity 4, slowQueue capacity 2, 2 slow workers,
\* deadline 6 ticks, slow=3 ticks, hot=1 tick.
\*
\* With 5 slow events:
\*   Hot path drains events at ticks 1, 2, 3, 4, 5 into slow queue.
\*   slowQueue capacity 2 means events 4,5 are dropped if queue still full.
\*   Workers process events from slow queue with T=3 ticks each.
\*   Some events will miss the deadline of 6 ticks.  Expect violation.
CONSTANTS
    NumEvents = 5
    EB_Cap    = 4
    SQ_Cap    = 2
    Workers   = 2
    Deadline  = 6
    SlowTicks = 3
    HotTicks  = 1

INVARIANT NoDeadlineMiss
