SPECIFICATION Spec

\* 4 events delivered to BOTH ES clients.
\* FAA path: eventBuffer capacity 3, slowQueue capacity 2, 2 slow workers.
\* Jail path: unbounded serial queue.
\* Deadline 5 ticks, slow=3, hot=1, jail=2.
\*
\* FAA violation (all slow): hot drains at ticks 1,2,3; workers take e1,e2
\* (finish 4,5); e3 gets permit at tick 4 -> finishes 7 > 5.
\*
\* Jail violation (all jailed): serial processing e1->2, e2->4, e3->6 > 5.
\*
\* Expect NoDeadlineMiss violated on BOTH paths.
CONSTANTS
    NumEvents = 4
    EB_Cap    = 3
    SQ_Cap    = 2
    Workers   = 2
    Deadline  = 5
    SlowTicks = 3
    HotTicks  = 1
    JailTicks = 2

INVARIANT NoDeadlineMiss
